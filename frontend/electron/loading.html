<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>China Bedsheet Store</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.22), transparent 42%),
          linear-gradient(135deg, #020617 0%, #0f172a 100%);
        color: #e2e8f0;
        font-family: Segoe UI, Arial, sans-serif;
      }

      .shell {
        width: min(520px, calc(100vw - 48px));
        padding: 34px 30px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.86);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 28px 60px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      .bar {
        margin-top: 22px;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
      }

      .bar::after {
        content: "";
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%);
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0% {
          transform: translateX(-12%);
        }

        50% {
          transform: translateX(180%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <h1>China Bedsheet Store</h1>
      <p>Application start ho rahi hai. Backend aur database connection verify ki ja rahi hai.</p>
      <div class="bar"></div>
    </section>
  </body>
</html>
